name: Phase Regression

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: phase-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-phase-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Phase 6 Baseline
        run: |
          node test-phase-6-1-knowledge.js
          node test-phase-6-2-resilience.js
          node test-phase-6-3-learning.js
          node test-phase-6-4-orchestration.js

      - name: Phase 7 Aggregate
        run: node test-phase-7-all.js

      - name: Phase 8 Aggregate
        run: node test-phase-8-all.js

      - name: Phase 8 Deterministic Loop
        run: |
          for i in $(seq 1 10); do
            echo "Run $i"
            node test-phase-8-completion.js
          done
