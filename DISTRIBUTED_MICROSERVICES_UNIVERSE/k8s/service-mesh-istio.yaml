# ISTIO GATEWAY
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: universe-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
# VIRTUAL SERVICES FOR EACH SERVICE
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: consciousness-service-vs
spec:
  hosts:
  - "*"
  gateways:
  - universe-gateway
  http:
  - match:
    - uri:
        prefix: /consciousness
    route:
    - destination:
        host: consciousness-service
        port:
          number: 8000
---
